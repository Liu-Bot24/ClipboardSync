<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clipboard Sync</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="title" data-i18n="app.sharedClipboard">共享剪贴板</div>
          <div id="status" class="status">连接中</div>
        </div>
        <div class="top-actions">
          <button id="historyButton" class="icon-button" title="历史" aria-label="历史" data-i18n-title="action.history" data-i18n-aria-label="action.history" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5M12 7v5l3 2"/></svg>
          </button>
          <button id="refresh" class="icon-button" title="刷新" aria-label="刷新" data-i18n-title="action.refresh" data-i18n-aria-label="action.refresh">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 7v5h-5" />
              <path d="M4 17v-5h5" />
              <path d="M18.6 9A7 7 0 0 0 6 7.1" />
              <path d="M5.4 15A7 7 0 0 0 18 16.9" />
            </svg>
          </button>
        </div>
      </header>

      <section class="controls">
        <label><input id="pauseSend" type="checkbox" /> <span data-i18n="settings.pauseSend">暂停发送</span></label>
        <label><input id="pauseReceive" type="checkbox" /> <span data-i18n="settings.pauseReceive">暂停接收</span></label>
        <label><input id="autoLaunch" type="checkbox" /> <span data-i18n="settings.autoLaunch">开机启动</span></label>
      </section>

      <details class="connection">
        <summary data-i18n="connection.section">连接</summary>
        <div class="connection-grid">
          <label><span data-i18n="connection.server">服务器</span> <input id="hubUrl" type="text" /></label>
          <label><span data-i18n="connection.token">令牌（可选）</span> <input id="token" type="password" /></label>
          <button id="saveConnection" data-i18n="action.save">保存</button>
        </div>
      </details>

      <details class="ignore-rules">
        <summary data-i18n="ignore.section">忽略</summary>
        <div class="ignore-grid">
          <label class="wide-option"><input id="ignoreUnknownSource" type="checkbox" /> <span data-i18n="ignore.unknownSource">忽略未知复制来源</span></label>
          <div class="recent-source-group">
            <div class="field-label" data-i18n="ignore.recentSources">最近复制来源</div>
            <div id="recentSources" class="recent-sources"></div>
          </div>
          <label><span data-i18n="ignore.rules">规则</span> <textarea id="ignoredSourcePatterns" rows="3" spellcheck="false" placeholder="可手动填写，一行一个" data-i18n-placeholder="ignore.rulesPlaceholder"></textarea></label>
          <button id="saveIgnore" data-i18n="action.save">保存</button>
        </div>
      </details>

      <section class="panel">
        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th data-i18n="devices.send">发送</th>
              <th data-i18n="devices.receive">接收</th>
            </tr>
          </thead>
          <tbody id="devices"></tbody>
        </table>
      </section>

      <footer>
        <button id="quit" data-i18n="action.quit">退出</button>
      </footer>
    </main>
    <script src="./i18n.cjs"></script>
    <script src="./ui-renderer.js"></script>
  </body>
</html>
